<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社セリエコンチェルト</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.jpeg" type="image/jpeg">
  <meta name="theme-color" content="#000080">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="セリエ">
  <link rel="apple-touch-icon" href="logo.jpeg">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="loginScreen" class="login-screen">
    <div class="dq-win login-box">
      <h2 style="margin-bottom:14px;">⚔ ログイン</h2>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="loginPassword" placeholder="パスワードを入力">
      </div>
      <div id="loginError" class="login-error"></div>
      <button class="btn-primary" id="loginBtn" style="width:100%;margin-top:6px;">ログイン</button>
    </div>
  </div>

  <!-- 初回セットアップ（管理者登録） -->
  <div id="setupScreen" class="login-screen" style="display:none">
    <div class="dq-win login-box">
      <h2 style="margin-bottom:14px;">⚔ 初回セットアップ（代表取締役）</h2>
      <p style="color:#aaddff;font-size:0.78rem;margin-bottom:10px;">スタッフが未登録です。最初に代表取締役（管理者）のアカウントを作成してください。</p>
      <div class="form-group">
        <label>名前</label>
        <input type="text" id="setupName" placeholder="例：芹江匡晋">
      </div>
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="setupEmail" placeholder="メールアドレス">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="setupPassword" placeholder="パスワード（6文字以上）">
      </div>
      <div id="setupError" class="login-error"></div>
      <button class="btn-primary" id="setupBtn" style="width:100%;margin-top:6px;">管理者を作成</button>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="appRoot" style="display:none">
  <header>
    <div class="header-inner">
      <h1>⚔ 株式会社セリエコンチェルト</h1>
      <div class="header-actions">
        <span id="loginUserLabel" class="login-user-label"></span>
        <select id="filterAssignee">
          <option value="">全員</option>
        </select>
        <button class="btn-primary" id="openModalBtn" style="display:none">＋ タスク追加</button>
        <button class="btn-secondary" id="logoutBtn">ログアウト</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" id="tab-task" onclick="switchTab('task')">タスク管理</button>
      <button class="tab" id="tab-time" onclick="switchTab('time')">タイムカード</button>
      <button class="tab" id="tab-staff" onclick="switchTab('staff')">スタッフ管理</button>
    </div>
  </header>

  <!-- タスクボード -->
  <main id="page-task">
    <div class="board">
      <div class="column" id="col-未着手">
        <div class="column-header">
          <span class="column-title">未着手</span>
          <span class="column-count" id="count-未着手">0</span>
        </div>
        <div class="task-list" id="list-未着手" data-status="未着手"></div>
      </div>
      <div class="column" id="col-進行中">
        <div class="column-header">
          <span class="column-title">進行中</span>
          <span class="column-count" id="count-進行中">0</span>
        </div>
        <div class="task-list" id="list-進行中" data-status="進行中"></div>
      </div>
      <div class="column" id="col-完了">
        <div class="column-header">
          <span class="column-title">完了</span>
          <span class="column-count" id="count-完了">0</span>
        </div>
        <div class="task-list" id="list-完了" data-status="完了"></div>
      </div>
    </div>
  </main>

  <!-- タイムカード -->
  <main id="page-time" style="display:none">
    <div class="time-container">
      <div class="time-month-bar">
        <button class="btn-secondary" onclick="changeMonth(-1)">◀</button>
        <span id="monthLabel" class="month-label"></span>
        <button class="btn-secondary" onclick="changeMonth(1)">▶</button>
        <select id="timeStaffFilter" onchange="renderTimeCard()" class="staff-filter"></select>
      </div>
      <div class="time-total-bar" id="timeTotalBar"></div>
      <div class="time-calendar" id="timeCalendar"></div>
    </div>
  </main>

  <!-- スタッフ管理 -->
  <main id="page-staff" style="display:none">
    <div class="staff-page">
      <div class="staff-list-box">
        <div id="staffListEl"></div>
      </div>
      <div class="dq-win" id="addStaffBox" style="margin-bottom:12px;">
        <div class="form-group">
          <label>▶ 新規スタッフ名</label>
          <input type="text" id="newStaffName" placeholder="名前を入力" maxlength="20">
        </div>
        <div class="form-group">
          <label>▶ 役職</label>
          <input type="text" id="newStaffRole" placeholder="例：スタッフ、パート など" maxlength="20">
        </div>
        <div class="form-group">
          <label>▶ メールアドレス</label>
          <input type="email" id="newStaffEmail" placeholder="ログイン用メールアドレス">
        </div>
        <div class="form-group">
          <label>▶ パスワード</label>
          <input type="text" id="newStaffPassword" placeholder="ログイン用パスワード（6文字以上）">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
          <input type="checkbox" id="newStaffIsAdmin" style="width:18px;height:18px;cursor:pointer;">
          <label style="color:#aaddff;font-size:0.82rem;cursor:pointer;" for="newStaffIsAdmin">管理者権限（全スタッフのタイムカードを見られる）</label>
        </div>
        <div id="addStaffError" class="login-error"></div>
        <button class="btn-primary" onclick="addStaff()" style="width:100%;margin-top:6px;">＋ スタッフを追加</button>
      </div>
    </div>
  </main>

  <!-- タスクモーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">タスク追加</h2>
        <button class="modal-close" id="closeModalBtn">✕</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label>タイトル <span class="required">*</span></label>
          <input type="text" id="taskTitle" placeholder="タスクのタイトル" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>担当者</label>
            <select id="taskAssignee"><option value="">未設定</option></select>
          </div>
          <div class="form-group">
            <label>優先度</label>
            <select id="taskPriority">
              <option value="中">中</option>
              <option value="高">高</option>
              <option value="低">低</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>事業所</label>
            <select id="taskBusiness"><option value="">未設定</option></select>
          </div>
          <div class="form-group">
            <label>期日</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>ステータス</label>
            <select id="taskStatus">
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <textarea id="taskMemo" rows="2" placeholder="補足情報など"></textarea>
          <div class="quick-phrases">
            <button type="button" class="phrase-btn" onclick="insertPhrase('taskMemo', '対応中')">対応中</button>
            <button type="button" class="phrase-btn" onclick="insertPhrase('taskMemo', '確認待ち')">確認待ち</button>
            <button type="button" class="phrase-btn" onclick="insertPhrase('taskMemo', '保留')">保留</button>
            <button type="button" class="phrase-btn" onclick="insertPhrase('taskMemo', '要確認')">要確認</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="deleteTaskBtn" style="display:none">削除</button>
          <div>
            <button type="button" class="btn-secondary" id="cancelBtn">キャンセル</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- タイムカードモーダル -->
  <div class="modal-overlay" id="timeModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="timeModalTitle">勤務記録</h2>
        <button class="modal-close" onclick="closeTimeModal()">✕</button>
      </div>
      <form id="timeForm">
        <input type="hidden" id="timeId">
        <input type="hidden" id="timeDate">
        <input type="hidden" id="timeStaff">
        <div class="form-group">
          <label>日付・スタッフ</label>
          <div id="timeInfo" style="color:#fff;font-size:0.88rem;padding:5px 0;letter-spacing:1px;"></div>
        </div>
        <div class="form-group">
          <label>スタッフ選択 <span class="required">*</span></label>
          <select id="timeStaffSelect" onchange="document.getElementById('timeStaff').value=this.value">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>事業所 <span class="required">*</span></label>
          <select id="timeBusinessSelect">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>勤務時間 <span class="required">*</span></label>
          <div class="hour-buttons" id="hourButtons"></div>
          <input type="hidden" id="timeHours">
          <div class="hour-display" id="hourDisplay">未選択</div>
        </div>
        <div class="form-group">
          <label>🔑 鍵は閉めましたか？ <span class="required">*</span></label>
          <input type="hidden" id="timeLock">
          <div class="lock-buttons">
            <button type="button" class="lock-btn" id="lockYes" onclick="selectLock(true)">▶ はい</button>
            <button type="button" class="lock-btn" id="lockNo" onclick="selectLock(false)">▶ いいえ</button>
          </div>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <input type="text" id="timeMemo" placeholder="例：午前のみ、早退など">
          <div class="quick-phrases">
            <button type="button" class="phrase-btn" onclick="insertPhrase('timeMemo', '午前のみ')">午前のみ</button>
            <button type="button" class="phrase-btn" onclick="insertPhrase('timeMemo', '早退')">早退</button>
            <button type="button" class="phrase-btn" onclick="insertPhrase('timeMemo', '遅刻')">遅刻</button>
            <button type="button" class="phrase-btn" onclick="insertPhrase('timeMemo', '直行')">直行</button>
            <button type="button" class="phrase-btn" onclick="insertPhrase('timeMemo', '直帰')">直帰</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="deleteTimeBtn" style="display:none">削除</button>
          <div>
            <button type="button" class="btn-secondary" onclick="closeTimeModal()">キャンセル</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- お疲れ様メッセージ -->
  <div id="thanksOverlay" style="display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(0,0,30,0.7);">
    <div class="dq-win" style="max-width:340px;width:90%;text-align:center;padding:32px 24px;">
      <div style="font-size:2rem;margin-bottom:16px;">⚔</div>
      <div id="thanksMsg" style="font-size:1.1rem;line-height:1.8;letter-spacing:2px;white-space:pre-line;"></div>
      <button class="btn-primary" onclick="document.getElementById('thanksOverlay').style.display='none'" style="margin-top:24px;width:100%;">とじる</button>
    </div>
  </div>

  </div><!-- /appRoot -->

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        location.reload();
      });
    }
  </script>
</body>
</html>
