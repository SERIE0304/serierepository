<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>セリエコンチェルト</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.jpeg" type="image/jpeg">
  <meta name="theme-color" content="#000080">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="セリエ">
  <link rel="apple-touch-icon" href="logo.jpeg">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>⚔ セリエコンチェルト</h1>
      <div class="header-actions">
        <select id="filterAssignee">
          <option value="">全員</option>
        </select>
        <select id="filterBusiness">
          <option value="">全事業所</option>
        </select>
        <button class="btn-primary" id="openModalBtn" style="display:none">＋ タスク追加</button>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" id="tab-task" onclick="switchTab('task')">タスク管理</button>
      <button class="tab" id="tab-time" onclick="switchTab('time')">タイムカード</button>
      <button class="tab" id="tab-staff" onclick="switchTab('staff')">スタッフ管理</button>
    </div>
  </header>

  <!-- タスクボード -->
  <main id="page-task">
    <div class="board">
      <div class="column" id="col-未着手">
        <div class="column-header">
          <span class="column-title">未着手</span>
          <span class="column-count" id="count-未着手">0</span>
        </div>
        <div class="task-list" id="list-未着手" data-status="未着手"></div>
      </div>
      <div class="column" id="col-進行中">
        <div class="column-header">
          <span class="column-title">進行中</span>
          <span class="column-count" id="count-進行中">0</span>
        </div>
        <div class="task-list" id="list-進行中" data-status="進行中"></div>
      </div>
      <div class="column" id="col-完了">
        <div class="column-header">
          <span class="column-title">完了</span>
          <span class="column-count" id="count-完了">0</span>
        </div>
        <div class="task-list" id="list-完了" data-status="完了"></div>
      </div>
    </div>
  </main>

  <!-- タイムカード -->
  <main id="page-time" style="display:none">
    <div class="time-container">
      <div class="time-month-bar">
        <button class="btn-secondary" onclick="changeMonth(-1)">◀</button>
        <span id="monthLabel" class="month-label"></span>
        <button class="btn-secondary" onclick="changeMonth(1)">▶</button>
        <select id="timeStaffFilter" onchange="renderTimeCard()" class="staff-filter">
          <option value="">全スタッフ</option>
        </select>
        <select id="timeBusinessFilter" onchange="renderTimeCard()" class="staff-filter">
          <option value="">全事業所</option>
        </select>
      </div>
      <div class="time-total-bar" id="timeTotalBar"></div>
      <div class="time-calendar" id="timeCalendar"></div>
    </div>
  </main>

  <!-- スタッフ管理 -->
  <main id="page-staff" style="display:none">
    <div class="staff-page">
      <div class="staff-list-box">
        <div id="staffListEl"></div>
      </div>
      <div class="dq-win" style="margin-bottom:12px;">
        <div class="form-group">
          <label>▶ 新規スタッフ名</label>
          <input type="text" id="newStaffName" placeholder="名前を入力" maxlength="20">
        </div>
        <div class="form-group">
          <label>▶ 役職</label>
          <input type="text" id="newStaffRole" placeholder="例：スタッフ、パート など" maxlength="20">
        </div>
        <button class="btn-primary" onclick="addStaff()" style="width:100%;margin-top:6px;">＋ スタッフを追加</button>
      </div>
    </div>
  </main>

  <!-- タスクモーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">タスク追加</h2>
        <button class="modal-close" id="closeModalBtn">✕</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <div class="form-group">
          <label>タイトル <span class="required">*</span></label>
          <input type="text" id="taskTitle" placeholder="タスクのタイトル" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>担当者</label>
            <select id="taskAssignee"><option value="">未設定</option></select>
          </div>
          <div class="form-group">
            <label>優先度</label>
            <select id="taskPriority">
              <option value="中">中</option>
              <option value="高">高</option>
              <option value="低">低</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>事業所</label>
            <select id="taskBusiness"><option value="">未設定</option></select>
          </div>
          <div class="form-group">
            <label>期日</label>
            <input type="date" id="taskDueDate">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>ステータス</label>
            <select id="taskStatus">
              <option value="未着手">未着手</option>
              <option value="進行中">進行中</option>
              <option value="完了">完了</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <textarea id="taskMemo" rows="2" placeholder="補足情報など"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="deleteTaskBtn" style="display:none">削除</button>
          <div>
            <button type="button" class="btn-secondary" id="cancelBtn">キャンセル</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- タイムカードモーダル -->
  <div class="modal-overlay" id="timeModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="timeModalTitle">勤務記録</h2>
        <button class="modal-close" onclick="closeTimeModal()">✕</button>
      </div>
      <form id="timeForm">
        <input type="hidden" id="timeId">
        <input type="hidden" id="timeDate">
        <input type="hidden" id="timeStaff">
        <div class="form-group">
          <label>日付・スタッフ</label>
          <div id="timeInfo" style="color:#fff;font-size:0.88rem;padding:5px 0;letter-spacing:1px;"></div>
        </div>
        <div class="form-group">
          <label>スタッフ選択 <span class="required">*</span></label>
          <select id="timeStaffSelect" onchange="document.getElementById('timeStaff').value=this.value">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>事業所 <span class="required">*</span></label>
          <select id="timeBusinessSelect">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>勤務時間 <span class="required">*</span></label>
          <div class="hour-buttons" id="hourButtons"></div>
          <input type="hidden" id="timeHours">
          <div class="hour-display" id="hourDisplay">未選択</div>
        </div>
        <div class="form-group">
          <label>🔑 鍵は閉めましたか？ <span class="required">*</span></label>
          <input type="hidden" id="timeLock">
          <div class="lock-buttons">
            <button type="button" class="lock-btn" id="lockYes" onclick="selectLock(true)">▶ はい</button>
            <button type="button" class="lock-btn" id="lockNo" onclick="selectLock(false)">▶ いいえ</button>
          </div>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <input type="text" id="timeMemo" placeholder="例：午前のみ、早退など">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="deleteTimeBtn" style="display:none">削除</button>
          <div>
            <button type="button" class="btn-secondary" onclick="closeTimeModal()">キャンセル</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        location.reload();
      });
    }
  </script>
</body>
</html>
