<!-- ========================================
  Honey LaRva FC加盟ボタン（浮きウィジェット）
  Goope「外部パーツ」に貼り付けるコード
  計算ツールの左隣に表示されます
  ======================================== -->
<style>
#fc-fab{position:fixed;bottom:24px;right:96px;z-index:9997;font-family:'Hiragino Sans','Meiryo',sans-serif;}
#fc-btn{
  height:60px;
  padding:0 18px;
  background:linear-gradient(135deg,#ffc800,#ff8c00);
  border:none;
  border-radius:30px;
  font-size:13px;
  font-weight:bold;
  color:#1a1a2e;
  cursor:pointer;
  box-shadow:0 4px 18px rgba(255,200,0,0.5);
  transition:transform .2s,box-shadow .2s;
  display:flex;
  align-items:center;
  gap:8px;
  white-space:nowrap;
  line-height:1.3;
}
#fc-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,200,0,0.6);}
#fc-btn .icon{font-size:20px;}
#fc-btn .label{text-align:left;}
#fc-btn .label .top{font-size:10px;opacity:.75;}
#fc-btn .label .bottom{font-size:13px;font-weight:bold;}
#fc-panel{display:none;position:fixed;bottom:96px;right:96px;width:300px;background:#16213e;border:1px solid rgba(255,200,0,0.35);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:9996;color:#fff;overflow:hidden;}
#fc-panel.open{display:block;}
#fc-head{background:linear-gradient(135deg,rgba(255,200,0,.15),rgba(255,140,0,.1));padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,200,0,.2);}
#fc-head .av{width:36px;height:36px;background:linear-gradient(135deg,#ffc800,#ff8c00);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
#fc-head .nm{font-size:13px;font-weight:bold;color:#fff;line-height:1.3;}
#fc-head .sb{font-size:10px;color:rgba(255,255,255,.5);}
#fc-close{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1;flex-shrink:0;}
#fc-body{padding:20px;}
.fc-title{font-size:15px;font-weight:bold;color:#ffc800;margin-bottom:12px;text-align:center;}
.fc-list{font-size:13px;color:rgba(255,255,255,.8);line-height:2;margin-bottom:16px;}
.fc-list li{list-style:none;padding-left:4px;}
.fc-list li::before{content:'✅ ';}
.fc-cta-btn{display:block;width:100%;padding:13px;background:linear-gradient(135deg,#ffc800,#ff8c00);border:none;border-radius:10px;color:#1a1a2e;font-size:14px;font-weight:bold;cursor:pointer;text-align:center;text-decoration:none;transition:transform .2s;box-sizing:border-box;}
.fc-cta-btn:hover{transform:translateY(-1px);}
.fc-note{margin-top:12px;font-size:11px;color:rgba(255,255,255,.4);text-align:center;}
</style>

<div id="fc-fab">
  <div id="fc-panel">
    <div id="fc-head">
      <div class="av">🏢</div>
      <div>
        <div class="nm">フランチャイズ加盟募集</div>
        <div class="sb">Honey LaRva FC加盟のご案内</div>
      </div>
      <button id="fc-close" onclick="fcClose()">✕</button>
    </div>
    <div id="fc-body">
      <div class="fc-title">あなたの地域でジムを開業！</div>
      <ul class="fc-list">
        <li>研修・開業サポートあり</li>
        <li>集客支援・マーケティング支援</li>
        <li>継続コンサルティング</li>
        <li>Honey LaRvaブランドで開業</li>
      </ul>
      <a class="fc-cta-btn" href="https://honeylarva.com/contact" target="_blank">🏢 FC加盟について問い合わせる</a>
      <p class="fc-note">☎ 0287-33-9217</p>
    </div>
  </div>
  <button id="fc-btn" onclick="fcToggle()" title="FC加盟募集">
    <span class="icon">🏢</span>
    <span class="label">
      <div class="top">Honey LaRva</div>
      <div class="bottom">FC加盟募集</div>
    </span>
  </button>
</div>

<script>
var fcOpen=false;
function fcToggle(){fcOpen=!fcOpen;document.getElementById('fc-panel').classList.toggle('open',fcOpen);}
function fcClose(){fcOpen=false;document.getElementById('fc-panel').classList.remove('open');}
</script>
