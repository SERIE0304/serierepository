<!-- ========================================
  Honey LaRva 浮きチャットボット
  Goope「外部パーツ」に貼り付けるコード
  ======================================== -->
<style>
#hl-fab{position:fixed;bottom:24px;right:24px;z-index:9999;font-family:'Hiragino Sans','Meiryo',sans-serif;}
#hl-btn{width:60px;height:60px;background:linear-gradient(135deg,#ffc800,#ff8c00);border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(255,200,0,0.45);transition:transform .2s;}
#hl-btn:hover{transform:scale(1.1);}
#hl-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;background:#f44336;border-radius:50%;border:2px solid #fff;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
#hl-panel{display:none;position:fixed;bottom:96px;right:24px;width:320px;height:480px;background:#16213e;border:1px solid rgba(255,200,0,0.35);border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);flex-direction:column;z-index:9998;}
#hl-panel.open{display:flex;}
#hl-head{background:linear-gradient(135deg,rgba(255,200,0,.15),rgba(255,140,0,.1));padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,200,0,.2);}
#hl-head .av{width:36px;height:36px;background:linear-gradient(135deg,#ffc800,#ff8c00);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;}
#hl-head .nm{font-size:14px;font-weight:bold;color:#fff;}
#hl-head .st{font-size:11px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px;}
#hl-head .sd{width:6px;height:6px;background:#4caf50;border-radius:50%;animation:blink 2s infinite;}
#hl-close{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;line-height:1;}
#hl-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
#hl-msgs::-webkit-scrollbar{width:3px;}
#hl-msgs::-webkit-scrollbar-thumb{background:rgba(255,200,0,.3);border-radius:2px;}
.hm{display:flex;gap:8px;max-width:90%;}
.hm.u{align-self:flex-end;flex-direction:row-reverse;}
.hm .hav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;align-self:flex-end;}
.hm.b .hav{background:linear-gradient(135deg,#ffc800,#ff8c00);}
.hm.u .hav{background:rgba(255,255,255,.12);}
.hm .hb{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.6;color:#fff;}
.hm.b .hb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:3px;}
.hm.u .hb{background:linear-gradient(135deg,#ffc800,#ff8c00);color:#1a1a2e;font-weight:500;border-bottom-right-radius:3px;}
.hqr{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 8px;}
.hqb{background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.3);color:#ffc800;font-size:12px;padding:5px 10px;border-radius:16px;cursor:pointer;white-space:nowrap;}
.hqb:hover{background:rgba(255,200,0,.2);}
.htd{display:none;align-items:center;gap:4px;padding:8px 12px;background:rgba(255,255,255,.08);border-radius:12px;width:fit-content;}
.htd.on{display:flex;}
.htd span{width:6px;height:6px;background:rgba(255,255,255,.5);border-radius:50%;animation:bounce 1.2s infinite;}
.htd span:nth-child(2){animation-delay:.2s}.htd span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
#hl-inp-area{padding:10px 12px;border-top:1px solid rgba(255,200,0,.15);background:rgba(0,0,0,.2);display:flex;gap:8px;align-items:center;}
#hl-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:8px 14px;color:#fff;font-size:13px;font-family:inherit;outline:none;}
#hl-inp:focus{border-color:#ffc800;}
#hl-inp::placeholder{color:rgba(255,255,255,.35);}
#hl-send{width:36px;height:36px;background:linear-gradient(135deg,#ffc800,#ff8c00);border:none;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#hl-send:disabled{opacity:.5;cursor:not-allowed;}
</style>

<div id="hl-fab">
  <div id="hl-panel">
    <div id="hl-head">
      <div class="av">🥊</div>
      <div>
        <div class="nm">LaRva AIアシスタント</div>
        <div class="st"><div class="sd"></div>オンライン</div>
      </div>
      <button id="hl-close" onclick="hlClose()">✕</button>
    </div>
    <div id="hl-msgs">
      <div class="hm b"><div class="hav">🥊</div><div class="hb">こんにちは！🥊<br>Honey LaRvaのAIアシスタントです。ご質問どうぞ！</div></div>
    </div>
    <div class="hqr" id="hl-qr">
      <button class="hqb" onclick="hlQ('ジムへ通う目的を教えて')">🎯 通う目的</button>
      <button class="hqb" onclick="hlQ('体験レッスンは？')">体験レッスン</button>
      <button class="hqb" onclick="hlQ('料金は？')">料金</button>
      <button class="hqb" onclick="hlQ('クラスの種類は？')">クラス</button>
      <button class="hqb" onclick="hlQ('場所は？')">アクセス</button>
      <button class="hqb" onclick="hlQ('FC加入について')">FC加入</button>
    </div>
    <div id="hl-inp-area">
      <input id="hl-inp" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')hlSend()">
      <button id="hl-send" onclick="hlSend()">➤</button>
    </div>
  </div>
  <button id="hl-btn" onclick="hlToggle()" title="AIアシスタントに質問">🥊
    <div id="hl-badge"></div>
  </button>
</div>

<script>
var hlOpen=false,hlBusy=false;
function hlToggle(){hlOpen=!hlOpen;document.getElementById('hl-panel').classList.toggle('open',hlOpen);document.getElementById('hl-badge').style.display=hlOpen?'none':'block';if(hlOpen)document.getElementById('hl-inp').focus();}
function hlClose(){hlOpen=false;document.getElementById('hl-panel').classList.remove('open');}
function hlNow(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function hlAdd(role,text){
  var c=document.getElementById('hl-msgs');
  var el=document.createElement('div');el.className='hm '+(role==='b'?'b':'u');
  el.innerHTML='<div class="hav">'+(role==='b'?'🥊':'👤')+'</div><div class="hb">'+text.replace(/\n/g,'<br>')+'</div>';
  c.appendChild(el);c.scrollTop=c.scrollHeight;
}
function hlTyping(show){
  var el=document.getElementById('hl-td');
  if(!el){el=document.createElement('div');el.id='hl-td';el.className='hm b';el.innerHTML='<div class="hav">🥊</div><div class="htd on" id="hl-tdi"><span></span><span></span><span></span></div>';document.getElementById('hl-msgs').appendChild(el);}
  el.style.display=show?'flex':'none';
  if(show)document.getElementById('hl-msgs').scrollTop=9999;
}
function hlAnswer(q){
  q=q.toLowerCase();
  if(q.includes('目的')||q.includes('なぜ')||q.includes('理由'))return 'どんな目的でお越しですか？🎯\nあてはまるものを入力してください！\n\n① ダイエット\n② お子さんの体力づくり\n③ 骨盤底筋・姿勢改善\n④ 競技の上達\n⑤ 健康維持・ストレス発散';
  if(q.includes('ダイエット')||q.includes('減量')||q.includes('痩せ')||q.includes('体重'))return 'ダイエットを目指す方にぴったりです💪\n【科学的根拠】WHO推奨：週150〜300分の中強度有酸素運動が体重管理に有効。フィットネスボクシングはMET値7〜8の高強度運動で、EPOC（運動後過剰酸素消費）効果により24〜48時間カロリー消費が続きます（NSCA）。\nダイエット計算ツールで目標日数もチェック！\n体験レッスン ¥2,000 でまずお試しください！\n▶ https://honeylarva.com/contact';
  if(q.includes('健康')||q.includes('体力')||q.includes('維持')||q.includes('ストレス')||q.includes('発散')||q.includes('リフレッシュ'))return '健康維持・ストレス発散に最適です🥊😤\n【科学的根拠】WHO：週150分以上の有酸素運動で生活習慣病リスクを20〜30%低減、うつ・不安障害リスクも最大30%低減。運動によるエンドルフィン分泌とコルチゾール低下が科学的に証明されています。ミット打ちで心身ともにスッキリ！\n体験レッスン ¥2,000 でお気軽にどうぞ🎉\n▶ https://honeylarva.com/contact';
  if(q.includes('競技')||q.includes('ボクシング上達')||q.includes('大会')||q.includes('試合')||q.includes('上達'))return '競技・ボクシング上達を目指す方も歓迎です🥊\n【科学的根拠】NSCA-CPTの「特異性の原則」に基づき、ボクシング特有の動作を反復することで反応時間・協調性・心肺機能が向上。段階的トレーニング計画（ピリオダイゼーション）で実力を着実に伸ばします。\n▶ まずは相談：https://honeylarva.com/contact';
  if(q.includes('骨盤')||q.includes('姿勢')||q.includes('骨盤底筋'))return '骨盤底筋・姿勢改善はHoney LaRvaの最も得意とする分野です🌟\n【科学的根拠】NSCA：コアスタビリティ強化で腰痛リスクが有意に低下（複数のRCT研究で実証）。骨盤底筋トレーニングは尿漏れ・骨盤臓器脱の予防に有効とされ、産後ケアにも推奨されています。\n体験レッスン ¥2,000 でぜひ体感を👇\n▶ https://honeylarva.com/contact';
  if(q.includes('子供')||q.includes('子ども')||q.includes('お子'))return 'ジュニア体育クラスはお子さんの体力づくりに最適です🧒\n【科学的根拠】WHO（5〜17歳ガイドライン）：1日60分以上の中〜高強度身体活動を推奨。週3回以上の骨強化運動で骨密度向上。NSCA：多様な動作パターンが運動神経・協調性・社会性の発達を促進します。\n月4回 ¥5,000 / 月8回 ¥7,000（新規受付中）\n▶ お問い合わせ：https://honeylarva.com/contact';
  if(q.includes('体験')||q.includes('試し'))return '体験レッスンは¥2,000（1回）です！🥊\n大田原店・黒磯店とも営業時間内であればいつでもOK！\n初めての方も大歓迎です。\n▶ お申し込み：https://honeylarva.com/contact';
  if(q.includes('料金')||q.includes('値段')||q.includes('いくら')||q.includes('価格')||q.includes('費用')||q.includes('プラン'))return '料金プラン（税込・大田原／黒磯 共通）💪\n【一般コース】月4回 ¥6,000／月8回 ¥7,000／フリー ¥10,000\n【ジュニア】月4回 ¥5,000／月8回 ¥7,000\n【シニア(60歳以上)】¥8,000\n【パーソナル】60分 ¥10,000\n【オンラインダイエット】月 ¥13,000\n⚠️大田原・黒磯とも一般会員は新規入会一時停止中。ジュニアは受付中！\n📞 電話またはメールでご予約いただければ、空き次第ご連絡します。\n☎ 0287-33-9217\n✉ https://honeylarva.com/contact';
  if(q.includes('クラス')||q.includes('種類')||q.includes('コース')||q.includes('プログラム'))return 'クラスは3種類あります🥊\n【一般クラス】骨盤・呼吸を意識したフィットネスボクシング（60歳以上はシニア料金）\n【ジュニア体育クラス】小中学生対象・多様性重視の基礎トレーニング\n【オンラインダイエット】自宅から参加できるダイエットプログラム\n▶ 詳細：https://honeylarva.com/contact';
  if(q.includes('大田原'))return '【大田原店】📍\n住所：大田原市山の手1-7-7\n営業時間：\n・平日 13:30〜15:00 / 18:00〜21:00\n　※17:00〜18:00はジュニア枠（一般は18:00〜）\n・土曜・祝日 13:30〜17:00\n定休日：水曜日・日曜日\n☎ 0287-33-9217';
  if(q.includes('黒磯')||q.includes('那須塩原'))return '【黒磯店】📍\n住所：那須塩原市中央町3-12 2F\n（福島整形外科向かい）\n営業時間：平日 15:00〜19:30\n定休日：月曜日・水曜日・第4日曜日\n☎ 0287-33-9217';
  if(q.includes('場所')||q.includes('アクセス')||q.includes('どこ')||q.includes('住所'))return 'どちらの店舗をお探しですか？📍\n「大田原店」または「黒磯店」と入力してください！\n\n【大田原店】大田原市山の手1-7-7\n【黒磯店】那須塩原市中央町3-12 2F';
  if(q.includes('fc')||q.includes('フランチャイズ')||q.includes('加盟')||q.includes('加入'))return 'Honey LaRvaのFC加盟で、ご自身の地域でジムを開業できます🎉\n研修・集客サポート充実！お問い合わせください。';
  if(q.includes('シニア')||q.includes('60')||q.includes('高齢'))return '60歳以上の方はシニア料金 ¥8,000 で一般クラスにご参加いただけます👴👵\n無理なく安全に続けられるプログラムです！';
  if(q.includes('ジュニア')||q.includes('子供')||q.includes('子ども'))return 'ジュニア体育クラスは小中学生対象です🧒\n多様性を重視した基礎トレーニングでお子さんの体力づくりに最適！\n月4回 ¥5,000 / 月8回 ¥7,000（新規受付中）';
  if(q.includes('オンライン'))return 'オンラインダイエットコースは月額 ¥13,000です💻\n自宅から参加できるダイエットプログラムです。\n▶ お申し込み：https://honeylarva.com/contact';
  return 'ご質問ありがとうございます🥊\n詳しくは公式HP（honeylarva.com）またはジムへ直接お問い合わせください！';
}
async function hlSend(){
  var inp=document.getElementById('hl-inp');
  var text=inp.value.trim();if(!text||hlBusy)return;
  inp.value='';document.getElementById('hl-qr').style.display='none';
  hlBusy=true;document.getElementById('hl-send').disabled=true;
  hlAdd('u',text);hlTyping(true);
  await new Promise(function(r){setTimeout(r,700);});
  hlTyping(false);hlAdd('b',hlAnswer(text));
  hlBusy=false;document.getElementById('hl-send').disabled=false;inp.focus();
}
function hlQ(t){document.getElementById('hl-inp').value=t;hlSend();}
</script>
