<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#ffffff"/>
  <!-- test tube body -->
  <rect x="38" y="10" width="24" height="62" rx="12" fill="white" stroke="black" stroke-width="4"/>
  <!-- liquid fill -->
  <rect x="38" y="48" width="24" height="24" fill="black"/>
  <ellipse cx="50" cy="72" rx="12" ry="12" fill="black"/>
  <!-- measurement lines -->
  <line x1="52" y1="22" x2="60" y2="22" stroke="black" stroke-width="2.5"/>
  <line x1="52" y1="32" x2="60" y2="32" stroke="black" stroke-width="2.5"/>
  <line x1="52" y1="42" x2="60" y2="42" stroke="black" stroke-width="2.5"/>
  <!-- rim at top -->
  <rect x="34" y="8" width="32" height="8" rx="3" fill="black"/>
</svg>
