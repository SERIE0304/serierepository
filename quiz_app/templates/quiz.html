{% extends "base.html" %}
{% block content %}
<p class="progress">問題 {{ progress }} / {{ total }}</p>
<form method="post" action="{{ url_for('quiz_answer') }}" class="card" id="quiz-form">
  <input type="hidden" name="question_id" value="{{ question.id }}">
  <input type="hidden" name="correct_index_shuffled" value="{{ correct_index }}">
  <input type="hidden" name="selected_index" value="-1" id="selected-index-hidden">
  <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
    <h2 style="margin:0; flex:1;">{{ question.question_text }}</h2>
    <div id="timer-display" style="font-size:1.8rem; font-weight:bold; color:#e74c3c; min-width:2.5rem; text-align:center;">15</div>
  </div>
  <div id="timer-bar-bg" style="height:8px; background:#eee; border-radius:4px; overflow:hidden;">
    <div id="timer-bar" style="height:100%; width:100%; background:#e74c3c; border-radius:4px; transition:width 1s linear;"></div>
  </div>
  {% for choice in choices %}
    <label class="choice">
      <input type="radio" name="selected_index_radio" value="{{ loop.index0 }}" onchange="document.getElementById('selected-index-hidden').value=this.value; playTap();">
      {{ choice }}
    </label>
  {% endfor %}
  <button type="submit" id="submit-btn">回答する</button>
</form>
<script>
  var audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function playTap() {
    try {
      var ctx = getAudioCtx();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.12);
    } catch(e) {}
  }

  var timeLeft = 15;
  var bar = document.getElementById('timer-bar');
  var display = document.getElementById('timer-display');
  var form = document.getElementById('quiz-form');

  var timer = setInterval(function() {
    timeLeft--;
    display.textContent = timeLeft;
    bar.style.width = (timeLeft / 15 * 100) + '%';
    if (timeLeft <= 5) bar.style.background = '#c0392b';
    if (timeLeft <= 0) {
      clearInterval(timer);
      display.textContent = '0';
      bar.style.width = '0%';
      form.submit();
    }
  }, 1000);

  document.getElementById('submit-btn').addEventListener('click', function() {
    clearInterval(timer);
  });
</script>
{% endblock %}
