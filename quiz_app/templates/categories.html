{% extends "base.html" %}
{% block content %}
<h1>{{ track }}</h1>
<p>{{ staff_name }} さん、カテゴリを選んでください</p>
<form method="post" action="{{ url_for('quiz_start') }}" class="card">
  <input type="hidden" name="staff_name" value="{{ staff_name }}">
  <input type="hidden" name="track" value="{{ track }}">
  <label>カテゴリ
    <select name="category">
      <option value="">全カテゴリ</option>
      {% for c in categories %}
        <option value="{{ c }}">{{ c }}</option>
      {% endfor %}
    </select>
  </label>
  <button type="submit">クイズを始める</button>
</form>
<p><a href="{{ url_for('index') }}">戻る</a></p>
{% endblock %}
